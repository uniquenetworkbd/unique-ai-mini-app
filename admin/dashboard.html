<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Network | Admin Control Panel</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* এই পেইজের জন্য কাস্টম এডমিন সিএসএস */
        body { padding-bottom: 20px; } /* ড্যাশবোর্ডে Bottom Nav লাগবে না */
        .admin-header {
            background: #333;
            color: white;
            padding: 20px;
            text-align: left;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: relative;
        }
        .admin-header h2 { margin: 0; font-size: 22px; }
        .admin-header p { margin: 5px 0 0; font-size: 14px; opacity: 0.8; }
        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #eee;
        }
        .stat-card i { font-size: 35px; color: var(--primary); margin-bottom: 10px; }
        .stat-card h3 { margin: 0; font-size: 24px; color: #333; }
        .stat-card p { margin: 5px 0 0; font-size: 14px; color: #777; }
    </style>
</head>
<body>

    <div class="admin-header">
        <button class="logout-btn" onclick="logoutAdmin()">লগআউট</button>
        <h2>Unique Admin Panel</h2>
        <p>ইউনিক নেটওয়ার্ক কন্ট্রোল রুম | নোয়াখালী</p>
    </div>

    <div class="container">
        
        <h3 style="margin-top:0;"><i class="fas fa-chart-line"></i> কুইক স্ট্যাটাস</h3>
        <div class="stat-grid">
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <h3>২৫০+</h3>
                <p>মোট ইউজার</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-wifi"></i>
                <h3>৩</h3>
                <p>একটিভ POP</p>
            </div>
        </div>

        <h3 style="margin-top:20px;"><i class="fas fa-cogs"></i> কন্ট্রোল টুলস</h3>
        <div class="grid">
            <div class="card stat-card" onclick="alert('ইউজার ডাটা লোড হচ্ছে...')"><i class="fas fa-user-edit"></i><p>ইউজার ম্যানেজমেন্ট</p></div>
            <div class="card stat-card" onclick="alert('প্যাকেজ সেটিংস লোড হচ্ছে...')"><i class="fas fa-box-open"></i><p>প্যাকেজ সেটিংস</p></div>
            <div class="card stat-card" onclick="alert('টেলিগ্রাম বট সেটিংস...')"><i class="fas fa-robot"></i><p>বট কনফিগার</p></div>
            <div class="card stat-card" onclick="alert('বিল হিস্ট্রি লোড হচ্ছে...')"><i class="fas fa-receipt"></i><p>বিল হিস্ট্রি</p></div>
        </div>

        <div class="ai-box" style="margin-top: 20px; border-left: 6px solid #ffaa00;">
            <h4 style="margin-top:0;"><i class="fas fa-broadcast-tower" style="color:#ffaa00;"></i> লাইভ এলার্ট</h4>
            <input type="text" id="alertMsg" placeholder="এলার্ট মেসেজটি এখানে লিখুন...">
            <button class="btn-main" style="background: #ffaa00; color: #333;" onclick="sendAlert()">সবার কাছে পাঠান</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function logoutAdmin() {
            // টেলিগ্রামের জন্য সেফ এক্সিট
            tg.close();
            // অথবা যদি আপনি হোম পেইজে যেতে চান
            // window.location.href = "../index.html";
        }

        function sendAlert() {
            let msg = document.getElementById('alertMsg').value;
            if(msg) {
                // এটি Make.com এ ডাটা পাঠাবে বা আপনার বটের মাধ্যমে ব্রডকাস্ট করবে
                tg.sendData(msg); 
                alert("এলার্ট পাঠানো হচ্ছে। আপনার সাপোর্ট বটের মাধ্যমে চেক করুন।");
                document.getElementById('alertMsg').value = '';
            } else {
                alert("দয়া করে একটি মেসেজ লিখুন।");
            }
        }
    </script>
</body>
</html>
