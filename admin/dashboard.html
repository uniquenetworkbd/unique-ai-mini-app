<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration Editor | Unique Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        .editor-container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-top: 20px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        .input-group input, .input-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .save-btn { background: #0088cc; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .save-btn:disabled { background: #ccc; }
        #loadingOverlay { display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:99; justify-content:center; align-items:center; flex-direction:column; }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <i class="fas fa-spinner fa-spin fa-3x" style="color:#0088cc;"></i>
        <p>GitHub এর সাথে সিঙ্ক হচ্ছে...</p>
    </div>

    <div class="header" style="background:#222;">
        <h2><i class="fas fa-cogs"></i> Configuration Editor</h2>
    </div>

    <div class="container">
        <div id="authBox" class="editor-container">
            <h4>GitHub Access Token</h4>
            <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
            <button class="save-btn" style="margin-top:10px;" onclick="loadCurrentConfig()">কনফিগারেশন লোড করুন</button>
        </div>

        <div id="mainEditor" class="editor-container" style="display:none;">
            <div class="input-group">
                <label>System Status</label>
                <select id="field_status">
                    <option value="Online">Online ✅</option>
                    <option value="Maintenance">Maintenance 🛠️</option>
                    <option value="Offline">Offline ❌</option>
                </select>
            </div>

            <div class="input-group">
                <label>Live Alert Message</label>
                <input type="text" id="field_alert" placeholder="সবার জন্য এলার্ট মেসেজ...">
            </div>

            <div class="input-group">
                <label>Bot Personality (Soul)</label>
                <select id="field_soul">
                    <option value="Professional">Professional 👔</option>
                    <option value="Friendly">Friendly 😊</option>
                    <option value="Expert">Cyber Expert 🛡️</option>
                </select>
            </div>

            <div class="input-group">
                <label>Maintenance Mode</label>
                <select id="field_maintenance">
                    <option value="false">Off</option>
                    <option value="true">On (App Blocked)</option>
                </select>
            </div>

            <button id="btnSave" class="save-btn" onclick="saveNewConfig()">
                <i class="fas fa-cloud-upload-alt"></i> GitHub এ সেভ করুন
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const REPO_INFO = {
            owner: "uniquenetworkbd",
            repo: "unique-ai-mini-app",
            path: "config.json"
        };

        let currentFileSha = "";

        // গিটহাব থেকে বর্তমান ডাটা লোড করা
        async function loadCurrentConfig() {
            const token = document.getElementById('ghToken').value;
            if(!token) return alert("দয়া করে টোকেন দিন!");

            document.getElementById('loadingOverlay').style.display = 'flex';
            
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_INFO.owner}/${REPO_INFO.repo}/contents/${REPO_INFO.path}`, {
                    headers: { "Authorization": `token ${token}` }
                });
                
                if(response.ok) {
                    const data = await response.json();
                    currentFileSha = data.sha;
                    const config = JSON.parse(atob(data.content));
                    
                    // ইনপুট ফিল্ডে ডাটা বসানো
                    document.getElementById('field_status').value = config.system_status;
                    document.getElementById('field_alert').value = config.live_alert;
                    document.getElementById('field_soul').value = config.bot_soul;
                    document.getElementById('field_maintenance').value = config.maintenance_mode.toString();

                    document.getElementById('authBox').style.display = 'none';
                    document.getElementById('mainEditor').style.display = 'block';
                } else {
                    alert("ডাটা লোড করা যায়নি। টোকেনটি চেক করুন।");
                }
            } catch (err) {
                alert("এরর: " + err.message);
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        // নতুন ডাটা গিটহাবে সেভ করা
        async function saveNewConfig() {
            const token = document.getElementById('ghToken').value;
            const btn = document.getElementById('btnSave');
            
            const updatedConfig = {
                system_status: document.getElementById('field_status').value,
                live_alert: document.getElementById('field_alert').value,
                bot_soul: document.getElementById('field_soul').value,
                maintenance_mode: document.getElementById('field_maintenance').value === "true",
                last_updated: new Date().toLocaleString('bn-BD')
            };

            btn.disabled = true;
            document.getElementById('loadingOverlay').style.display = 'flex';

            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_INFO.owner}/${REPO_INFO.repo}/contents/${REPO_INFO.path}`, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: "Config updated via Admin Editor",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(updatedConfig, null, 2)))),
                        sha: currentFileSha
                    })
                });

                if(response.ok) {
                    tg.showAlert("✅ কনফিগারেশন রিয়েল-টাইমে আপডেট হয়েছে!");
                    // SHA আপডেট করা পরবর্তী সেভ এর জন্য
                    const result = await response.json();
                    currentFileSha = result.content.sha;
                } else {
                    alert("সেভ করা যায়নি!");
                }
            } catch (err) {
                alert("এরর: " + err.message);
            } finally {
                btn.disabled = false;
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }
    </script>
</body>
    </html>
