<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Admin | Unique Network</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ইউজার ইন্টারফেস ডিজাইন */
        .hidden { display: none !important; }
        .login-screen { position: fixed; inset: 0; background: #1a1a1a; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn-action { background: #0088cc; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; }
        .tab { padding: 10px 20px; background: #eee; border-radius: 20px; cursor: pointer; font-size: 14px; white-space: nowrap; }
        .tab.active { background: #0088cc; color: white; }
    </style>
</head>
<body>

    <div id="loginScreen" class="login-screen">
        <div class="card" style="width: 85%; max-width: 350px; text-align: center;">
            <i class="fas fa-user-lock fa-3x" style="color: #0088cc;"></i>
            <h3>Unique Admin Login</h3>
            <input type="text" id="adminID" placeholder="Admin ID">
            <input type="password" id="adminPass" placeholder="Password">
            <button class="btn-action" onclick="attemptLogin()">প্রবেশ করুন</button>
        </div>
    </div>

    <div id="mainDashboard" class="hidden">
        <div class="header" style="background: #222; display: flex; justify-content: space-between; align-items: center; padding: 15px;">
            <h3 style="margin:0; font-size: 16px;">Unique Control Room</h3>
            <button onclick="logout()" style="background:none; border:none; color:white;"><i class="fas fa-sign-out-alt"></i></button>
        </div>

        <div class="container" style="padding: 15px;">
            <div class="nav-tabs">
                <div class="tab active" onclick="switchTab('overview')">Overview</div>
                <div class="tab" onclick="switchTab('bot')">Bot Config</div>
                <div class="tab" onclick="switchTab('sys')">System Settings</div>
            </div>

            <div id="tab_overview" class="tab-content">
                <div class="card" style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; text-align:center;">
                    <div><i class="fas fa-users"></i><h4>250+</h4><p>Users</p></div>
                    <div><i class="fas fa-wifi"></i><h4>Online</h4><p>Status</p></div>
                </div>
            </div>

            <div id="tab_bot" class="tab-content hidden">
                <div class="card">
                    <label>Bot Personality</label>
                    <select id="botSoul">
                        <option value="Professional">Professional 👔</option>
                        <option value="Friendly">Friendly 😊</option>
                    </select>
                    <button class="btn-action" style="margin-top:10px;" onclick="syncWithGitHub()">Save Bot Settings</button>
                </div>
            </div>

            <div id="tab_sys" class="tab-content hidden">
                <div class="card">
                    <h4><i class="fas fa-key"></i> API Configuration</h4>
                    <p style="font-size:12px; color:gray;">এখানে সেটিংস করলে তা এনক্রিপ্টেড অবস্থায় সেভ থাকবে।</p>
                    <label>GitHub Token</label>
                    <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx">
                    <label>Telegram Bot Token</label>
                    <input type="password" id="tgToken" placeholder="7123456:AAxxxxx">
                    <button class="btn-action" onclick="saveInternalConfig()">সব সেভ করুন (Encrypted)</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        // এনক্রিপশন ফাংশন (সহজ base64 - সিকিউরিটির জন্য আপনি এটি আরও উন্নত করতে পারেন)
        const encrypt = (data) => btoa(data);
        const decrypt = (data) => data ? atob(data) : "";

        // লগইন চেক
        function attemptLogin() {
            const id = document.getElementById('adminID').value;
            const pass = document.getElementById('adminPass').value;

            // উদাহরন আইডি-পাসওয়ার্ড (এটি আপনি পরিবর্তন করে নিবেন)
            if(id === "admin" && pass === "1234") {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
                loadSavedConfig();
            } else {
                alert("ভুল আইডি বা পাসওয়ার্ড!");
            }
        }

        // ইন্টারনাল সেটিংস সেভ করা (LocalStorage এ থাকবে, লগআউটে মুছবে না)
        function saveInternalConfig() {
            const config = {
                gh: encrypt(document.getElementById('ghToken').value),
                tg: encrypt(document.getElementById('tgToken').value)
            };
            localStorage.setItem('unique_encrypted_sys', JSON.stringify(config));
            alert("সিস্টেম কনফিগারেশন স্থায়ীভাবে সেভ হয়েছে!");
        }

        function loadSavedConfig() {
            const saved = localStorage.getItem('unique_encrypted_sys');
            if(saved) {
                const config = JSON.parse(saved);
                document.getElementById('ghToken').value = decrypt(config.gh);
                document.getElementById('tgToken').value = decrypt(config.tg);
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab_'+tabId).classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        function logout() {
            // শুধুমাত্র সেশন শেষ হবে, কিন্তু LocalStorage মুছবে না
            location.reload();
        }
    </script>
</body>
</html>
