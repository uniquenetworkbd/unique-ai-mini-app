<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique AI Super App</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="header">
        <h2 style="margin:0;">Unique Network</h2>
        <p style="margin:5px 0 0; font-size:14px; opacity:0.9;">আপনার ডিজিটাল নিরাপত্তার সঙ্গী</p>
    </div>

    <div class="container">
        <div class="ai-box">
            <h4 style="margin-top:0;"><i class="fas fa-robot"></i> Ask Unique AI</h4>
            <input type="text" id="aiQuery" placeholder="আপনার সমস্যাটি এখানে লিখুন...">
            <button class="btn-main" onclick="askAI()">জিজ্ঞাসা করুন</button>
        </div>

        <div class="grid">
            <div class="card" onclick="openLink('https://uniquenetworkbd.blogspot.com')"><i class="fas fa-rss"></i><p>News Feed</p></div>
            <div class="card" onclick="openLink('https://www.fast.com')"><i class="fas fa-tachometer-alt"></i><p>Speed Test</p></div>
            <div class="card" onclick="calculateBill()"><i class="fas fa-file-invoice-dollar"></i><p>Bill Calc</p></div>
            <div class="card" onclick="generatePass()"><i class="fas fa-key"></i><p>Pass Gen</p></div>
            <div class="card" onclick="alert('সার্ভার স্ট্যাটাস: অনলাইন ✅')"><i class="fas fa-server"></i><p>Status</p></div>
            <div class="card" onclick="toggleDarkMode()"><i class="fas fa-moon"></i><p>Theme</p></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-home"></i>Home</a>
        <a href="#" class="nav-item" onclick="alert('Tools Coming Soon')"><i class="fas fa-tools"></i>Tools</a>
        <a href="https://t.me/YourUsername" class="nav-item"><i class="fas fa-headset"></i>Support</a>
        <a href="admin/dashboard.html" class="nav-item"><i class="fas fa-user-shield"></i>Admin</a>
    </nav>

    <script src="js/main.js"></script>
</body>
</html>
