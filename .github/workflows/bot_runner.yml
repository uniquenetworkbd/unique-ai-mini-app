name: Telegram Bot Runner

on:
  schedule:
    # Run every 5 minutes to keep bot alive
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python 3.x
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create data directory
      run: |
        mkdir -p data
        # Create default brain.json if not exists
        if [ ! -f data/brain.json ]; then
          echo '{"brain_version": "1.0.0-Nano", "ai_sensitivity": 0.8, "knowledge_base": [], "default_responses": {"unknown": "Sorry, I don\'t understand."}}' > data/brain.json
        fi
    
    - name: Run Telegram Bot
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
        DATA_PATH: data/brain.json
      run: |
        # Run bot with timeout (max 4 minutes)
        timeout 240 python bot/main_bot.py || echo "Bot stopped after timeout"
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: bot-logs
        path: bot.log
        retention-days: 7
