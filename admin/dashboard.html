<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Admin | Unique Network</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #0088cc; --dark: #1a1a1a; --light: #f4f7f9; }
        body { background: var(--light); font-family: 'Segoe UI', sans-serif; margin: 0; }
        .hidden { display: none !important; }
        
        /* লগইন ডিজাইন */
        .login-screen { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* নেভিগেশন */
        .header { background: #222; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-tabs { display: flex; gap: 10px; padding: 15px; overflow-x: auto; background: white; border-bottom: 1px solid #ddd; }
        .tab { padding: 8px 18px; background: #eee; border-radius: 20px; cursor: pointer; font-size: 14px; white-space: nowrap; transition: 0.3s; }
        .tab.active { background: var(--primary); color: white; }

        /* ইনপুট ও বাটন */
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn-action:active { transform: scale(0.98); }
        
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-item { background: white; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="loginScreen" class="login-screen">
        <div class="card" style="width: 85%; max-width: 350px; text-align: center;">
            <i class="fas fa-user-shield fa-3x" style="color: var(--primary); margin-bottom: 10px;"></i>
            <h3 style="margin-bottom: 20px;">Unique Admin Login</h3>
            <input type="text" id="adminID" placeholder="Admin ID">
            <input type="password" id="adminPass" placeholder="Password">
            <button class="btn-action" onclick="attemptLogin()">প্রবেশ করুন</button>
            <p style="font-size: 11px; color: #888; margin-top: 15px;">Default: admin / 1234</p>
        </div>
    </div>

    <div id="mainDashboard" class="hidden">
        <div class="header">
            <h3 style="margin:0; font-size: 16px;">Unique Control Room</h3>
            <button onclick="logout()" style="background:none; border:none; color:white; font-size: 18px;"><i class="fas fa-power-off"></i></button>
        </div>

        <div class="nav-tabs">
            <div class="tab active" onclick="switchTab('overview')">Overview</div>
            <div class="tab" onclick="switchTab('bot')">Bot Config</div>
            <div class="tab" onclick="switchTab('sys')">System Settings</div>
            <div class="tab" onclick="switchTab('profile')">Profile</div>
        </div>

        <div class="container" style="padding: 15px;">
            
            <div id="tab_overview" class="tab-content">
                <div class="status-grid">
                    <div class="stat-item">
                        <i class="fas fa-users fa-2x" style="color:#3498db"></i>
                        <h4>২৫০+</h4>
                        <p style="font-size:12px; color:#666">মোট ইউজার</p>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-broadcast-tower fa-2x" style="color:#2ecc71"></i>
                        <h4>Active</h4>
                        <p style="font-size:12px; color:#666">নেটওয়ার্ক স্ট্যাটাস</p>
                    </div>
                </div>
            </div>

            <div id="tab_bot" class="tab-content hidden">
                <div class="card">
                    <h4><i class="fas fa-robot"></i> বট কনফিগারেশন</h4>
                    <label>Bot Personality (Soul)</label>
                    <select id="botSoul">
                        <option value="Professional">Professional 👔</option>
                        <option value="Friendly">Friendly 😊</option>
                        <option value="Expert">Cyber Expert 🛡️</option>
                    </select>
                    <label>Live Alert Message</label>
                    <input type="text" id="liveAlert" placeholder="সবার কাছে পাঠানোর জন্য মেসেজ...">
                    <button class="btn-action" onclick="syncWithGitHub()">Update Bot Settings</button>
                </div>
            </div>

            <div id="tab_sys" class="tab-content hidden">
                <div class="card">
                    <h4><i class="fas fa-key"></i> এপিআই ও টোকেন</h4>
                    <p style="font-size:12px; color:gray;">এই তথ্যগুলো এনক্রিপ্টেড অবস্থায় ব্রাউজারে সংরক্ষিত থাকবে।</p>
                    <label>GitHub Access Token</label>
                    <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx">
                    <label>Telegram Bot Token</label>
                    <input type="password" id="tgToken" placeholder="7123456:AAxxxxx">
                    <button class="btn-action" style="background:#2c3e50;" onclick="saveSystemConfig()">Save API Tokens</button>
                </div>
            </div>

            <div id="tab_profile" class="tab-content hidden">
                <div class="card">
                    <h4><i class="fas fa-user-edit"></i> অ্যাডমিন প্রোফাইল</h4>
                    <label>নতুন অ্যাডমিন আইডি</label>
                    <input type="text" id="newAdminID" placeholder="New Admin ID">
                    <label>নতুন পাসওয়ার্ড</label>
                    <input type="password" id="newAdminPass" placeholder="New Password">
                    <button class="btn-action" style="background:#e67e22;" onclick="updateAdminProfile()">Update Profile</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // এনক্রিপশন লজিক
        const encrypt = (str) => btoa(unescape(encodeURIComponent(str)));
        const decrypt = (str) => str ? decodeURIComponent(escape(atob(str))) : "";

        // ১. লগইন ফাংশন
        function attemptLogin() {
            const idInput = document.getElementById('adminID').value;
            const passInput = document.getElementById('adminPass').value;

            const savedProfile = JSON.parse(localStorage.getItem('unique_profile') || 'null');
            const validID = savedProfile ? decrypt(savedProfile.id) : "admin";
            const validPass = savedProfile ? decrypt(savedProfile.pass) : "1234";

            if(idInput === validID && passInput === validPass) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
                loadInternalData();
            } else {
                alert("ভুল আইডি বা পাসওয়ার্ড!");
            }
        }

        // ২. সিস্টেম সেটিংস সেভ (Persistent)
        function saveSystemConfig() {
            const data = {
                gh: encrypt(document.getElementById('ghToken').value),
                tg: encrypt(document.getElementById('tgToken').value)
            };
            localStorage.setItem('unique_sys_tokens', JSON.stringify(data));
            alert("টোকেনগুলো এনক্রিপ্টেড অবস্থায় সেভ করা হয়েছে!");
        }

        // ৩. প্রোফাইল আপডেট
        function updateAdminProfile() {
            const nid = document.getElementById('newAdminID').value;
            const npass = document.getElementById('newAdminPass').value;
            if(nid.length < 3 || npass.length < 4) return alert("তথ্য সঠিক নয়!");

            const profile = { id: encrypt(nid), pass: encrypt(npass) };
            localStorage.setItem('unique_profile', JSON.stringify(profile));
            alert("প্রোফাইল আপডেট সফল! পরবর্তী লগইন থেকে এটি কার্যকর হবে।");
        }

        // ৪. ইন্টারনাল ডাটা লোড
        function loadInternalData() {
            const tokens = JSON.parse(localStorage.getItem('unique_sys_tokens') || 'null');
            if(tokens) {
                document.getElementById('ghToken').value = decrypt(tokens.gh);
                document.getElementById('tgToken').value = decrypt(tokens.tg);
            }
        }

        // ৫. ট্যাব সুইচিং
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab_'+id).classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        function logout() { location.reload(); }

        // ৬. গিটহাব সিঙ্ক লজিক (সংক্ষিপ্ত)
        async function syncWithGitHub() {
            const tokens = JSON.parse(localStorage.getItem('unique_sys_tokens'));
            if(!tokens || !tokens.gh) return alert("প্রথমে সিস্টেম সেটিংসে GitHub Token দিন!");
            
            alert("গিটহাবের সাথে সিঙ্ক করার চেষ্টা করা হচ্ছে...");
            // এখানে পূর্বের প্রদত্ত GitHub API লজিকটি বসবে
        }
    </script>
</body>
</html>
