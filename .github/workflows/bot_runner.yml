name: Telegram Bot Runner

on:
  schedule:
    # Run every 5 minutes to keep bot alive
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: [ main ]
    paths:
      - 'bot/**'
      - 'data/**'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5  # Maximum runtime
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 1
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Setup data directory
      run: |
        mkdir -p data
        # Create default config if not exists
        if [ ! -f data/config.json ]; then
          echo '{"telegram_bot_token": "", "admin_chat_id": ""}' > data/config.json
        fi
    
    - name: Run bot
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
      run: |
        # Run bot with timeout
        python bot/main_bot.py &
        BOT_PID=$!
        sleep 240  # Run for 4 minutes
        kill $BOT_PID 2>/dev/null || true
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: bot-logs
        path: |
          bot.log
          data/brain.json
        retention-days: 3
