<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nano AI Control Center | Unique Network</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0088cc; --dark: #1a1a1a; --bg: #f4f7f9; --orange: #e67e22; --success: #2ecc71; --danger: #e74c3c; }
        body { background: var(--bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding-bottom: 30px; }
        .hidden { display: none !important; }
        .header { background: #222; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .nav-tabs { display: flex; gap: 10px; padding: 12px; overflow-x: auto; background: white; border-bottom: 1px solid #ddd; scrollbar-width: none; }
        .tab { padding: 8px 18px; background: #eee; border-radius: 20px; cursor: pointer; font-size: 13px; white-space: nowrap; transition: 0.3s; font-weight: 500; }
        .tab.active { background: var(--primary); color: white; }
        .container { padding: 15px; max-width: 800px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 15px; border: 1px solid #eee; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-action:disabled { opacity: 0.6; cursor: not-allowed; }
        .status-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #f1f1f1; font-size: 13px; }
    </style>
</head>
<body>

    <div id="loginScreen" style="position:fixed; inset:0; background:var(--dark); display:flex; align-items:center; justify-content:center; z-index:1000;">
        <div class="card" style="width: 85%; max-width: 350px; text-align: center;">
            <i class="fas fa-microchip fa-3x" style="color: var(--primary); margin-bottom: 15px;"></i>
            <h3>Unique Nano Admin</h3>
            <input type="text" id="adminID" placeholder="Admin ID">
            <input type="password" id="adminPass" placeholder="Password">
            <button class="btn-action" onclick="attemptLogin()">প্রবেশ করুন <i class="fas fa-sign-in-alt"></i></button>
        </div>
    </div>

    <div id="mainDashboard" class="hidden">
        <div class="header">
            <h3 style="margin:0; font-size: 16px;"><i class="fas fa-shield-alt"></i> Nano Control Room</h3>
            <button onclick="location.reload()" style="background:none; border:none; color:white;"><i class="fas fa-power-off"></i></button>
        </div>

        <div class="nav-tabs">
            <div class="tab active" onclick="switchTab('overview')">Overview</div>
            <div class="tab" onclick="switchTab('trainer')">Brain Trainer</div>
            <div class="tab" onclick="switchTab('health')">System Health</div>
            <div class="tab" onclick="switchTab('sys')">Settings</div>
        </div>

        <div class="container">
            <div id="tab_overview" class="tab-content">
                <div class="card" style="text-align:center;">
                    <i class="fas fa-robot fa-3x" style="color:var(--primary); margin-bottom:10px;"></i>
                    <h4>Nano AI is Active</h4>
                    <p id="repoShow" style="font-size:12px; color:gray;">Repo: Not Configured</p>
                </div>
            </div>

            <div id="tab_trainer" class="tab-content hidden">
                <div class="card">
                    <h4><i class="fas fa-graduation-cap"></i> Nano Brain Trainer</h4>
                    <input type="text" id="trainPattern" placeholder="Keywords: ইন্টারনেট, স্লো, গতি">
                    <textarea id="trainResponse" rows="4" placeholder="বটের উত্তর..."></textarea>
                    <button id="btnTrain" class="btn-action" style="background:var(--orange);" onclick="trainBot()">
                        <i class="fas fa-plus-circle"></i> নতুন জ্ঞান যোগ করুন
                    </button>
                </div>
            </div>

            <div id="tab_health" class="tab-content hidden">
                <div class="card">
                    <h4><i class="fas fa-heartbeat"></i> System Integrity</h4>
                    <div id="healthStatus" class="status-list"></div>
                    <button class="btn-action" style="background:var(--success); margin-top:10px;" onclick="checkIntegrity()">
                        <i class="fas fa-search"></i> স্ক্যান শুরু করুন
                    </button>
                    <button id="repairBtn" class="btn-action hidden" style="background:var(--danger); margin-top:10px;" onclick="startRepair()">
                        <i class="fas fa-tools"></i> Auto-Repair missing files
                    </button>
                </div>
            </div>

            <div id="tab_sys" class="tab-content hidden">
                <div class="card">
                    <h4><i class="fab fa-github"></i> GitHub Settings</h4>
                    <input type="password" id="ghToken" placeholder="GitHub PAT (ghp_...)">
                    <input type="text" id="ghRepo" placeholder="username/repository-name">
                    <button class="btn-action" style="background:#2c3e50;" onclick="saveSettings()">সেভ করুন</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dec = (s) => s ? decodeURIComponent(escape(atob(s))) : "";
        const enc = (s) => btoa(unescape(encodeURIComponent(s)));

        function attemptLogin() {
            if(document.getElementById('adminID').value === "admin" && document.getElementById('adminPass').value === "1234") {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
                loadSavedData();
            } else alert("ভুল তথ্য!");
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content, .tab').forEach(el => el.classList.remove('active', 'hidden'));
            document.querySelectorAll('.tab-content').forEach(el => { if(el.id !== 'tab_'+id) el.classList.add('hidden'); });
            event.currentTarget.classList.add('active');
        }

        function saveSettings() {
            const data = { gh: enc(document.getElementById('ghToken').value), repo: document.getElementById('ghRepo').value };
            localStorage.setItem('un_sys_config', JSON.stringify(data));
            alert("সেভ হয়েছে!");
            loadSavedData();
        }

        function loadSavedData() {
            const saved = JSON.parse(localStorage.getItem('un_sys_config') || '{}');
            if(saved.gh) {
                document.getElementById('ghToken').value = dec(saved.gh);
                document.getElementById('ghRepo').value = saved.repo;
                document.getElementById('repoShow').innerText = "Repo: " + saved.repo;
            }
        }

        // --- Core Functions (Integrity & Trainer) ---

        const files = ["data/brain.json", "bot/main_bot.py", "config.json", "admin/dashboard.html"];

        async function checkIntegrity() {
            const config = JSON.parse(localStorage.getItem('un_sys_config') || '{}');
            if(!config.gh) return alert("Settings সেটআপ করুন!");
            
            const statusDiv = document.getElementById('healthStatus');
            statusDiv.innerHTML = "চেকিং...";
            let html = ""; let missing = [];

            for(let file of files) {
                const res = await fetch(`https://api.github.com/repos/${config.repo}/contents/${file}`, {
                    headers: { Authorization: `token ${dec(config.gh)}` }
                });
                const ok = res.status === 200;
                html += `<div class="status-item"><span>${file}</span> <b style="color:${ok?'green':'red'}">${ok?'OK':'MISSING'}</b></div>`;
                if(!ok) missing.push(file);
            }
            statusDiv.innerHTML = html;
            document.getElementById('repairBtn').classList.toggle('hidden', missing.length === 0);
            localStorage.setItem('missing_files', JSON.stringify(missing));
        }

        async function trainBot() {
            const config = JSON.parse(localStorage.getItem('un_sys_config') || '{}');
            const pattern = document.getElementById('trainPattern').value;
            const response = document.getElementById('trainResponse').value;
            const btn = document.getElementById('btnTrain');

            if(!pattern || !response) return alert("সব ঘর পূরণ করুন!");
            btn.disabled = true; btn.innerHTML = "পুশ হচ্ছে...";

            try {
                // ১. বর্তমান ফাইল রিড করা
                const path = "data/brain.json";
                const getRes = await fetch(`https://api.github.com/repos/${config.repo}/contents/${path}`, {
                    headers: { Authorization: `token ${dec(config.gh)}` }
                });
                const fileData = await getRes.json();
                const brain = JSON.parse(atob(fileData.content));

                // ২. নতুন ডাটা যোগ
                brain.knowledge_base.push({ pattern: pattern.split(','), response: response });

                // ৩. গিটহাবে পুশ
                await fetch(`https://api.github.com/repos/${config.repo}/contents/${path}`, {
                    method: "PUT",
                    headers: { Authorization: `token ${dec(config.gh)}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: "Brain Trained: " + pattern,
                        content: enc(JSON.stringify(brain, null, 2)),
                        sha: fileData.sha
                    })
                });
                alert("সফলভাবে প্রশিক্ষণ দেওয়া হয়েছে!");
            } catch(e) { alert("Error: " + e.message); }
            btn.disabled = false; btn.innerHTML = "নতুন জ্ঞান যোগ করুন";
        }
    </script>
</body>
</html>
