<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Tools | আপনার ডিজিটাল টুলস</title>
    <link rel="stylesheet" href="css/style.css">
    <link id="theme-style" rel="stylesheet" href="">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="header">
        <h2 style="margin:0;">Unique Tools</h2>
        <p style="margin:5px 0 0; font-size:14px; opacity:0.9;">প্রয়োজনীয় সব টুলস এক জায়গায়</p>
    </div>

    <div class="container">
        <div class="ai-box" style="border-left: 6px solid #e2136e;">
            <h4 style="color:#e2136e; margin-top:0;"><i class="fas fa-calculator"></i> বিকাশ ক্যালকুলেটর (Advanced)</h4>
            <input type="number" id="bkashAmount" placeholder="টাকার পরিমাণ লিখুন..." style="border: 1px solid #e2136e; width: 100%; box-sizing: border-box;">
            <button class="btn-main" style="background:#e2136e; margin-top: 10px;" onclick="calculateBkash()">চার্জ হিসাব করুন</button>
            <div id="bkashResult" style="margin-top:15px;"></div>
        </div>

        <h3 style="margin-top:20px;"><i class="fas fa-th-large"></i> অন্যান্য টুলস</h3>
        <div class="grid">
            <div class="card" onclick="generatePass()"><i class="fas fa-key"></i><p>Pass Gen</p></div>
            <div class="card" onclick="alert('QR কোড শীঘ্রই আসছে...')"><i class="fas fa-qrcode"></i><p>QR Code</p></div>
            <div class="card" onclick="openLink('https://www.whatismyip.com')"><i class="fas fa-network-wired"></i><p>IP Checker</p></div>
            <div class="card" onclick="toggleDarkMode()"><i class="fas fa-moon"></i><p>Theme</p></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i>Home</a>
        <a href="tools.html" class="nav-item active"><i class="fas fa-tools"></i>Tools</a>
        <a href="javascript:void(0)" class="nav-item" onclick="openSupportPopup()"><i class="fas fa-headset"></i>Support</a>
        <a href="admin/dashboard.html" class="nav-item"><i class="fas fa-user-shield"></i>Admin</a>
    </nav>

    <script src="js/main.js"></script>
    <script>
        function openSupportPopup() {
            const tg = window.Telegram.WebApp;
            tg.showConfirm("সরাসরি সাপোর্ট বটের সাথে কথা বলতে চান?", (confirm) => {
                if (confirm) {
                    tg.openTelegramLink("https://t.me/UniqueAIAssistantBot");
                }
            });
        }
    </script>
</body>
</html>
